[pytest]
testpaths = tests
addopts = -ra --tb=short --strict-markers
markers =
    slow: tests that load full foundation models (>30s on CPU)
    sam: requires the segment_anything package + SAM checkpoint
    sam2: requires the sam2 package + SAM2 checkpoint
    gui: builds a Tk root (skipped headless if no display)
filterwarnings =
    ignore::UserWarning
    ignore::FutureWarning
    ignore::DeprecationWarning
